<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07070c"/>
      <stop offset="0.5" stop-color="#0e0b1a"/>
      <stop offset="1" stop-color="#1a0a1e"/>
    </linearGradient>
    <linearGradient id="brandG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="33%" stop-color="#38bdf8"/>
      <stop offset="66%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="titleG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.8" r="0.6">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- pq mirror monogram -->
  <g transform="translate(500, 90) scale(0.8)">
    <g transform="translate(0 0)" fill="url(#brandG)" fill-rule="evenodd">
      <path d="M 70 60 L 120 60 A 50 50 0 0 1 120 160 L 95 160 L 95 240 L 70 240 Z M 95 85 L 120 85 A 25 25 0 0 1 120 135 L 95 135 Z"/>
    </g>
    <g transform="translate(300 0) scale(-1 1)" fill="url(#brandG)" fill-rule="evenodd">
      <path d="M 70 60 L 120 60 A 50 50 0 0 1 120 160 L 95 160 L 95 240 L 70 240 Z M 95 85 L 120 85 A 25 25 0 0 1 120 135 L 95 135 Z"/>
    </g>
  </g>

  <!-- Beta pill -->
  <g transform="translate(540 370)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#a78bfa" fill-opacity="0.18" stroke="#a78bfa" stroke-opacity="0.45" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#c4b5fd" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5">OPEN BETA</text>
  </g>

  <!-- Title -->
  <text x="600" y="460" text-anchor="middle" fill="url(#titleG)" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-1">pultiq</text>

  <!-- Tagline -->
  <text x="600" y="510" text-anchor="middle" fill="#c4b5fd" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600">AI nástroj, ktorý nahradí päť iných</text>

  <!-- Sub tagline -->
  <text x="600" y="555" text-anchor="middle" fill="#8f8fa8" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" letter-spacing="1">Helpdesk · Projekty · Fakturácia · Evidencia zariadení</text>

  <!-- URL -->
  <text x="600" y="600" text-anchor="middle" fill="#6b7280" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="500">www.pultiq.tech</text>
</svg>
